name: EAS Update (OTA)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
          - development
      message:
        description: 'Update message'
        required: false
        type: string

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN is not set. Add it at Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish update
        run: |
          CHANNEL="${{ github.event.inputs.channel || 'production' }}"
          MESSAGE="${{ github.event.inputs.message || github.event.head_commit.message }}"
          eas update --channel "$CHANNEL" --message "$MESSAGE" --non-interactive
